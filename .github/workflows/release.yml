name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ github.event.repository.default_branch }}
        fetch-depth: 0

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Extract version from tag
      id: tag_version
      run: |
        TAG=${GITHUB_REF#refs/tags/v}
        echo "version=$TAG" >> $GITHUB_OUTPUT

    - name: Update package.json version
      run: |
        npm version ${{ steps.tag_version.outputs.version }} --no-git-tag-version
        git config user.name github-actions
        git config user.email github-actions@github.com
        git add package.json
        git commit -m "chore: update version to ${{ steps.tag_version.outputs.version }}"
        git push origin ${{ github.event.repository.default_branch }}

    - name: Install dependencies
      run: npm install

    - name: Build plugin
      run: npm run build

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: build/openrct2-plugin-boilerplate.js
        body: |
          ## Installation
          Download `openrct2-plugin-boilerplate.js` and place it in your OpenRCT2 plugin directory:
          - Windows: `%USERPROFILE%\Documents\OpenRCT2\plugin\`
          - macOS: `~/Library/Application Support/OpenRCT2/plugin/`
          - Linux: `~/.config/OpenRCT2/plugin/`
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
